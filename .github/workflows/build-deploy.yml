      - name: Generate Client Config
        run: |
          cat > ./client/src/config.json << EOF
          {
            "api_url": "${{ vars.CLIENT_API_URL }}",
            "ad_tenant_id": "${{ vars.CLIENT_AD_TENANT_ID }}",
            "ad_authority": "${{ vars.CLIENT_AD_AUTHORITY }}",
            "ad_client_id": "${{ vars.CLIENT_AD_CLIENT_ID }}",
            "ad_scope": "${{ vars.CLIENT_AD_SCOPE }}",
            "ad_redirect_uri": "${{ vars.CLIENT_BASE_PATH || '/' }}",
            "ad_domain_hint": "${{ vars.CLIENT_AD_DOMAIN_HINT }}",
            "accessibility_testing_enabled": "false",
            "app_insights_connection_string": "${{ vars.CLIENT_APP_INSIGHTS_CONNECTION_STRING }}"
          }
          EOF
          echo "Generated config.json:"
          cat ./client/src/config.json

      - name: Build and Push Client Image to ACR
        run: |
          az acr build \
            --subscription "${{ vars.AZURE_RTL_SUBSCRIPTION_ID }}" \
            --registry "${{ vars.AZURE_CONTAINER_REGISTRY }}" \
            --source-acr-auth-id [caller] \
            --image "hby/${{ env.CLIENT_IMAGE_NAME }}:${{ github.sha }}" \
            --file "./client/Dockerfile" \
            --build-arg VITE_BASE_PATH="${{ vars.CLIENT_BASE_PATH || '/' }}" \
            ./client

  # =============================================================================
  # TEST: Deploy to Azure Container Apps
  # =============================================================================
  deploy-tst:
    name: Deploy to Test
    runs-on: ${{ vars.PROJECTLABEL }}-selfhosted-runner
    needs: push-images-tst
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || inputs.environment == 'tst' || inputs.environment == 'prd'
    environment: tst

    steps:
      - name: Azure Login (Federated Identity)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_RTL_SUBSCRIPTION_ID }}

      - name: Ensure API registry identity configured
        run: |
          az containerapp registry set \
            --name "${{ needs.push-images-tst.outputs.api-container-app }}" \
            --resource-group "${{ needs.push-images-tst.outputs.resource-group }}" \
            --server "${{ needs.push-images-tst.outputs.container-registry }}.azurecr.io" \
            --identity "${{ secrets.AZURE_RTL_MANAGED_IDENTITY }}"

      - name: Ensure Client registry identity configured
        run: |
          az containerapp registry set \
            --name "${{ needs.push-images-tst.outputs.client-container-app }}" \
