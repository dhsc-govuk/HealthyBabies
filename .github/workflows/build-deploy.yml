      api-container-app: ${{ vars.API_CONTAINER_APP }}
      client-container-app: ${{ vars.CLIENT_CONTAINER_APP }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (Federated Identity)
        uses: azure/login@v2
        with:
