<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="/images/icons/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/images/icons/favicon.ico" />

    <!-- GOV.UK Frontend Fonts - hosted locally to avoid CORS issues -->
    <style>
      @font-face {
        font-family: 'GDS Transport';
        font-style: normal;
        font-weight: 400;
        src: url('/fonts/light-94a07e06a1-v2.woff2') format('woff2'), url('/fonts/light-f591b13f7d-v2.woff') format('woff');
        font-display: swap;
      }
      @font-face {
        font-family: 'GDS Transport';
        font-style: normal;
        font-weight: 700;
        src: url('/fonts/bold-b542beb274-v2.woff2') format('woff2'), url('/fonts/bold-affa96571d-v2.woff') format('woff');
        font-display: swap;
      }

      /* Global font application - GOV.UK Design System requires GDS Transport everywhere */
      *,
      *::before,
      *::after {
        font-family: 'GDS Transport', arial, sans-serif;
      }

      html,
      body {
        font-family: 'GDS Transport', arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Form elements don't inherit fonts by default */
      button,
      input,
      select,
      textarea,
      optgroup {
        font-family: 'GDS Transport', arial, sans-serif;
      }
    </style>

    <meta name="viewport" content="minimum-scale=1, initial-scale=1, width=device-width" />
    <meta name="theme-color" content="#0b0c0c" />
    <meta name="aisight" content="aisight" />
    <link rel="apple-touch-icon" href="/images/icons/apple-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Report data on Best Start Family Hubs and Healthy Babies - GOV.UK</title>

  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
